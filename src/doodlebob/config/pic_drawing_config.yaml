doodlebob_picture_trajectory_publisher:
  ros__parameters:
    goal_names: ["c1", "c2", "c3", "c4"]
    start:
      angles: [0.0, -1.57, 0.0, -1.57, 0.0, 0.0]
    p1:
      angles: [1.57, -1.57, 1.57, 1.57, 1.57, 1.57]
    end:
      angles: [0.785, -1.57, 0.785, 0.785, 0.785, 0.785]
    # Corners of the paper. We used joint angles previously, we want to use points.
    # I think these still make it go out of bounds.
    c1:
      point: [0.1, 0.1]
    c2:
      point: [0.1, 0.2]
    c3:
      point: [0.2, 0.2]
    c4:
      point: [0.2, 0.1]

    # Acts as a z coordinate.
    pen_tip_dist: 0.15 # meters?

    goal_publish_delay_seconds: 5

    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

    controller: "scaled_joint_trajectory_controller"
    topic: "joint_trajectory"
